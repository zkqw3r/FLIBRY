{{$fav := .favorites}}
{{range .books}}
<div class="book-card">
    <div class="book-cover">
        <img src="/cover/{{.FlibustaID.String}}" alt="{{.Title}}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 200 300%27%3E%3Cdefs%3E%3ClinearGradient id=%27g%27 x1=%270%25%27 y1=%270%25%27 x2=%27100%25%27 y2=%27100%25%27%3E%3Cstop offset=%270%25%27 style=%27stop-color:%23181818%27/%3E%3Cstop offset=%27100%25%27 style=%27stop-color:%230a0a0a%27/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width=%27200%27 height=%27300%27 fill=%27url(%23g)%27/%3E%3Crect x=%2770%27 y=%27120%27 width=%2760%27 height=%2780%27 rx=%274%27 fill=%27rgba(255,255,255,0.05)%27/%3E%3Crect x=%2775%27 y=%27125%27 width=%2750%27 height=%273%27 fill=%27rgba(255,255,255,0.1)%27/%3E%3Crect x=%2775%27 y=%27132%27 width=%2750%27 height=%273%27 fill=%27rgba(255,255,255,0.1)%27/%3E%3Crect x=%2775%27 y=%27139%27 width=%2735%27 height=%273%27 fill=%27rgba(255,255,255,0.1)%27/%3E%3C/svg%3E'">
    </div>
    <div class="book-title">{{.Title}}</div>
    <div class="book-author">{{.Author.String}}</div>
    <div class="book-actions">
        <a href="/reader/{{.ID}}" class="btn btn-primary action-read">Читать</a>
        <a href="/download/{{.ID}}" class="btn btn-secondary action-download">Скачать</a>
        
        {{if and $fav (index $fav .ID)}}
            <button class="btn btn-primary" style="background: #4ade80; border-color: #4ade80; color: #000;" hx-post="/api/library/{{.ID}}/toggle" hx-swap="outerHTML">✓ Сохранено</button>
        {{else}}
            <button class="btn btn-secondary" hx-post="/api/library/{{.ID}}/toggle" hx-swap="outerHTML">В библиотеку</button>
        {{end}}
    </div>
</div>
{{else}}
<div class="empty-state">
    <div class="empty-state-icon">🔍</div>
    <div class="empty-state-text">Ничего не найдено</div>
</div>
{{end}}
